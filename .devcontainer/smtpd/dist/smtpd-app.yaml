resolver:
  cache:
    size: 10000
scripting:
  files:
  - data: |
      MIME-Version: 1.0
      Message-ID: <4dee0d82-42e1-11f1-b167-2bf370ae4941@se1-gles-sth1.inumbo.com>
      Date: Tue, 28 Apr 2026 11:04:46 +0200
      From: <sender@example.org>
      To: <recipient@example.com>
      Subject: Hello World
      Content-Type: multipart/alternative;
       boundary="4dee28de-42e1-11f1-b167-2bf370ae4941"

      --4dee28de-42e1-11f1-b167-2bf370ae4941
      Content-Type: text/plain; charset=utf-8

      *Hello World*
      --4dee28de-42e1-11f1-b167-2bf370ae4941
      Content-Type: text/html; charset=utf-8

      <strong>Hello World</strong>
      --4dee28de-42e1-11f1-b167-2bf370ae4941--
    id: test.eml
  - data: |
      import $mail from "test.eml";
      import $attachment from "test.txt";
      import { PDF } from "extras://pdf";

      $body = $mail->findByType(#/^text\/html$/) ?: $mail->getType() == "text/html" ? [$mail] : [];
      // $body = $mail->findByType(#/^text\/plain$/) ?: $mail->getType() == "text/plain" ? [$mail] : [];

      $pdf = PDF($body[0]->getBody(), ["format" => $body[0]->getType()]);
      $pdf->addAttachment("test.txt", $attachment, ["desc" => "Test attachment"]);
      $test = $pdf->toString(["password" => "test"]);
      echo $test;
    id: test.hsl
  - data: |-
      Foo Bar Baz
    id: test.txt
servers:
- id: default
  transport: mx
transportgroups:
- dsn:
    transport: mx
  id: default
  retry:
    count: 30
    intervals:
    - interval: 60
    - interval: 900
    - interval: 3600
      notify: true
    - interval: 7200
    - interval: 10800
  transports:
  - id: mx
    session:
      tls:
        mode: dane
version: '6.0'
